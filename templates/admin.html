<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartGo 後台管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .admin-header { background-color: #2c3e50; color: white; padding: 20px 0; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="admin-header shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h2 class="mb-0">🛠️ PartGo 零件後台管理系統</h2>
            <a href="/" class="btn btn-outline-light btn-sm">返回前台首頁</a>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row g-4">
            <div class="col-md-5">
                <div class="card shadow-sm p-4 bg-white border-0" style="border-radius: 12px;">
                    <h4 class="fw-bold text-dark mb-4">📥 新增二手越野零件網址</h4>
                    <form action="/admin" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">零件名稱</label>
                            <input type="text" name="name" class="form-control" placeholder="例如：Jeep 專用地墊" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">來源名稱 / 賣家</label>
                            <input type="text" name="source" class="form-control" placeholder="例如：Rough Country、FB社團" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">價格 (NT$)</label>
                            <input type="number" name="price" class="form-control" placeholder="0 代表面議" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">真實網址 (URL)</label>
                            <input type="url" name="link" class="form-control" placeholder="https://..." required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold mt-2 py-2">確認新增零件</button>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm p-4 bg-white border-0" style="border-radius: 12px;">
                    <h4 class="fw-bold text-dark mb-4">📋 目前已建立的零件清單 ({% if all_parts %}{{ all_parts|length }}{% else %}0{% endif %} 筆)</h4>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>名稱</th>
                                    <th>來源</th>
                                    <th>價格</th>
                                    <th>連結</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for part in all_parts %}
                                <tr>
                                    <td><strong class="text-dark">{{ part['name'] }}</strong></td>
                                    <td><span class="badge bg-secondary">{{ part['source'] }}</span></td>
                                    <td class="text-danger fw-bold">NT$ {{ part['price'] }}</td>
                                    <td><a href="{{ part['link'] }}" target="_blank" class="btn btn-outline-info btn-sm">測試</a></td>
                                </tr>
                                {% else %}
                                <tr>
                                    <td colspan="4" class="text-center text-muted py-4">目前資料庫空空如也。</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
