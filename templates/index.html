<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartGo 二手越野車零件比價網</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 60px 0; border-radius: 0 0 24px 24px; }
        .search-card { border-radius: 16px; border: none; margin-top: -30px; }
        .part-card { border-radius: 12px; border: none; transition: transform 0.2s; }
        .part-card:hover { transform: translateY(-5px); }
        .price-tag { color: #dc3545; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hero-section text-center shadow">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">🧭 PartGo 二手越野車零件比價網</h1>
            <p class="lead">整合全台報廢場、海外改裝大廠與社團網址，價格即時低到高自動比價排序</p>
            <a href="/admin" class="btn btn-sm btn-outline-light mb-2">⚙️ 進入後台管理</a>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                
                <div class="card search-card shadow p-4 bg-white mb-5">
                    <form action="/" method="get">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <input type="text" name="query" class="form-control form-control-lg" placeholder="輸入想比價的零件，例如：地墊、避震器、Jimny..." value="{{ query }}">
                            </div>
                            <div class="col-md-4">
                                <select name="brand" class="form-select form-select-lg">
                                    <option value="選擇品牌">選擇品牌</option>
                                    <option value="Jeep" {% if brand == 'Jeep' %}selected{% endif %}>Jeep (藍哥/角鬥士)</option>
                                    <option value="Suzuki" {% if brand == 'Suzuki' %}selected{% endif %}>Suzuki (Jimny)</option>
                                    <option value="Land Rover" {% if brand == 'Land Rover' %}selected{% endif %}>Land Rover (衛士)</option>
                                    <option value="Toyota" {% if brand == 'Toyota' %}selected{% endif %}>Toyota (海拉克斯)</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">搜尋比價</button>
                            </div>
                        </div>
                    </form>
                </div>

                {% if query %}
                    <h3 class="fw-bold text-dark mb-4">🔍 關於「{{ query }}」的比價結果：
