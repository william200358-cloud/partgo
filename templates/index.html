<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PartGo 全網汽車零件跨境導航比價網</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 60px 0; border-radius: 0 0 24px 24px; }
        .search-card { border-radius: 16px; border: none; margin-top: -30px; }
        .part-card { border-radius: 12px; border: none; transition: transform 0.2s; }
        .part-card:hover { transform: translateY(-5px); }
        .price-tag { color: #dc3545; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hero-section text-center shadow">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">🧭 PartGo 全網車件搜尋導航比價網</h1>
            <p class="lead">智慧注入全網核心搜尋引擎，一鍵精準空降 Facebook 貼文、比比昂、蝦皮與美日電商現場</p>
            <a href="/admin" class="btn btn-sm btn-outline-light mb-2">⚙️ 進入後台零件管理</a>
        </div>
    </div>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                
                <div class="card search-card shadow p-4 bg-white mb-5">
                    <form action="/" method="get">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <input type="text" name="query" class="form-control form-control-lg" placeholder="輸入想尋找的汽車零件，例如：避震、地墊、防撞桿、輪框..." value="{{ query }}" required>
                            </div>
                            <div class="col-md-4">
                                <select name="brand" class="form-select form-select-lg">
                                    <option value="選擇品牌">全球熱門渠道篩選</option>
                                    <option value="Facebook" {% if brand == 'Facebook' %}selected{% endif %}>Facebook (二手社團貼文)</option>
                                    <option value="比比昂" {% if brand == '比比昂' %}selected{% endif %}>Bibian 比比昂 (日本拍賣)</option>
                                    <option value="Shopee" {% if brand == 'Shopee' %}selected{% endif %}>Shopee 蝦皮購物</option>
                                    <option value="Ruten" {% if brand == 'Ruten' %}selected{% endif %}>Ruten 露天市集</option>
                                    <option value="eBay" {% if brand == 'eBay' %}selected{% endif %}>eBay (歐美外匯中心)</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">發動全網搜尋</button>
                            </div>
                        </div>
                    </form>
                </div>

                {% if query %}
                    <h3 class="fw-bold text-dark mb-4">🔍 關於汽車零件「{{ query }}」的全網即時跳轉通道：</h3>
                    
                    <div class="row row-cols-1 row-cols-md-2 g-4">
                        {% for part in results %}
                            <div class="col">
                                <div class="card part-card h-100 shadow-sm p-4 bg-white">
                                    <div class="d-flex justify-content-between align-items-start mb-3">
                                        <span class="badge bg-dark px-3 py-2">全網直達</span>
                                        <span class="badge bg-secondary px-2 py-1">{{ part['source'] }}</span>
                                    </div>
                                    
                                    <h5 class="card-title fw-bold text-dark mb-3" style="line-height: 1.5; min-height: 50px;">{{ part['name'] }}</h5>
                                    
                                    <div class="d-flex justify-content-between align-items-center mt-auto pt-3 border-top">
                                        <div>
                                            <span class="text-secondary small d-block">即時狀態</span>
                                            <span class="price-tag" style="font-size: 18px; color: #198754;">
                                                ➔ 進入現場挑選商品
                                            </span>
                                        </div>
                                        <a href="{{ part['link'] }}" target="_blank" class="btn btn-primary fw-bold px-4">前往查看 ➔</a>
                                    </div>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}

            </div>
        </div>
    </div>

</body>
</html>
